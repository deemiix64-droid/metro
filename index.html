<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>METRO SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 15px; margin: 0; }
        h2 { text-align: center; color: #f1c40f; }
        .card { background: #111; border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .info { display: flex; flex-direction: column; }
        .name { font-weight: bold; margin-bottom: 4px; }
        .old { color: #ff4d4d; text-decoration: line-through; font-size: 0.8em; }
        .price { color: #f1c40f; font-weight: bold; font-size: 1.2em; }
        button { background: #f1c40f; color: #000; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>МЕТРОШОП TIMIX</h2>
    <div id="catalog">Загрузка...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const SHEET_ID = '1crc2bmRKjYSbJbu4F8W_rvHxVnxt1x-T_hgI5m2uOOI';
        const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

        fetch(URL).then(r => r.text()).then(data => {
            const rows = data.split('\n').filter(row => row.trim() !== '').slice(1);
            let html = '';
            rows.forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 2) {
                    const n = cols[0].replace(/"/g, '').trim();
                    const p = cols[1].replace(/"/g, '').trim();
                    const s = cols[2] ? cols[2].replace(/"/g, '').trim() : ""; 
                    html += `
                    <div class="card">
                        <div class="info">
                            <span class="name">${n}</span>
                            ${s ? `<span class="old">${s} ⭐</span>` : ''}
                            <span class="price">${p} ⭐</span>
                        </div>
                        <button onclick="buy('${n}', '${p}')">КУПИТЬ</button>
                    </div>`;
                }
            });
            document.getElementById('catalog').innerHTML = html;
        });

        function buy(name, price) {
            tg.sendData(JSON.stringify({item: name, price: price}));
            setTimeout(() => { tg.close(); }, 150);
        }
    </script>
</body>
</html>
