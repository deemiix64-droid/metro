<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Control</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); padding: 15px; }
        button { background: var(--tg-theme-button-color); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; margin: 5px 0; font-weight: bold; }
        textarea { width: 100%; border-radius: 10px; padding: 10px; box-sizing: border-box; margin-top: 10px; background: rgba(0,0,0,0.1); color: var(--tg-theme-text-color); border: 1px solid #ccc; }
        .admin { display: none; border: 2px dashed red; padding: 10px; margin-top: 20px; }
    </style>
</head>
<body>
    <h3>Меню Игрока</h3>
    <button onclick="send({action: 'apply'})">📝 Подать заявку</button>
    <button onclick="send({action: 'account'})">👤 Мой аккаунт</button>

    <hr>
    <h4>Оставить жалобу</h4>
    <textarea id="rep" placeholder="Опишите проблему..."></textarea>
    <button onclick="sendReport()" style="background: #d90429;">Отправить жалобу</button>

    <div id="adm" class="admin">
        <h4>Админ-панель</h4>
        <button onclick="send({action: 'stats'})">Статистика</button>
        <button onclick="send({action: 'players_list'})">Удалить игрока</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Показ админки (Замени ID на свой)
        if (tg.initDataUnsafe.user && tg.initDataUnsafe.user.id === 12345678) {
            document.getElementById('adm').style.display = 'block';
        }

        function send(obj) {
            tg.sendData(JSON.stringify(obj));
        }

        function sendReport() {
            const val = document.getElementById('rep').value;
            if(!val) return alert("Пусто!");
            send({action: 'report', text: val});
        }
    </script>
</body>
</html>
